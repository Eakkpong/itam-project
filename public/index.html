<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMKCC - ระบบจัดการทรัพย์สินไอที (ITAM)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body x-data="itamApp()" x-init="initSystem()" class="bg-slate-50 text-gray-800 min-h-screen">

    <nav class="bg-slate-900 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">ระบบจัดการทรัพย์สินไอที (ITAM)</h1>
            <span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-full text-xs font-semibold animate-pulse">Online</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400 font-bold uppercase">จำนวนทั้งหมด</p>
                <p class="text-3xl font-extrabold text-slate-800 mt-2" x-text="(stats.total_assets || 0) + ' เครื่อง'"></p>
            </div>
            </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between">
                <h3 class="text-lg font-bold">📋 ทะเบียนข้อมูลพัสดุ</h3>
                <input type="text" x-model="searchQuery" @input.debounce.300ms="fetchEquipments()" placeholder="ค้นหา..." class="border rounded-xl px-4 py-2 text-sm">
            </div>
            
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                    <tr>
                        <th class="p-4">รหัสพัสดุ</th>
                        <th class="p-4">สถานที่</th>
                        <th class="p-4">สถานะ</th>
                        <th class="p-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <template x-for="item in equipments" :key="item.asset_code">
                        <tr>
                            <td class="p-4 font-mono font-bold text-indigo-700" x-text="item.asset_code"></td>
                            <td class="p-4" x-text="item.location"></td>
                            <td class="p-4" x-text="item.status"></td>
                            <td class="p-4 text-center">
                                <button @click="openEditModal(item)" class="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg text-xs font-bold hover:bg-amber-200">แก้ไข</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </main>

    <div x-show="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50">
        <div class="bg-white rounded-2xl w-full max-w-lg p-6">
            <h3 class="text-lg font-bold mb-4">แก้ไขข้อมูลพัสดุ</h3>
            <form @submit.prevent="saveEquipment()" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold">สถานที่ตั้ง</label>
                    <input type="text" x-model="editForm.location" class="w-full border rounded-lg px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm font-semibold">สถานะ</label>
                    <select x-model="editForm.status" class="w-full border rounded-lg px-4 py-2">
                        <option value="ใช้งานได้">ใช้งานได้</option>
                        <option value="ส่งซ่อม">ส่งซ่อม</option>
                    </select>
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" @click="isModalOpen = false" class="px-4 py-2 text-slate-600">ยกเลิก</button>
                    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function itamApp() {
            return {
                equipments: [],
                isModalOpen: false,
                editForm: { asset_code: '', location: '', status: '' },
                async initSystem() { await this.fetchEquipments(); },
                async fetchEquipments() {
                    const res = await fetch('/api/equipments');
                    this.equipments = await res.json();
                },
                openEditModal(item) {
                    this.editForm = { ...item };
                    this.isModalOpen = true;
                },
                async saveEquipment() {
                    const res = await fetch(`/api/equipments/${this.editForm.asset_code}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.editForm)
                    });
                    if (res.ok) {
                        this.isModalOpen = false;
                        await this.fetchEquipments();
                        Swal.fire('สำเร็จ', 'อัปเดตข้อมูลเรียบร้อยแล้ว', 'success');
                    }
                }
            }
        }
    </script>
</body>
</html>
